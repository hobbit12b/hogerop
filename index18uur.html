<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Raket vuur test</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #061323;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }
  .panel {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    z-index: 2;
    background: rgba(255,255,255,0.94);
    color: #17212d;
    border-radius: 18px;
    padding: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .title {
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 8px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  label {
    display: grid;
    grid-template-columns: 104px 1fr 48px;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }
  input[type="range"] { width: 100%; }
  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 10px 12px;
    font-weight: 800;
    background: #ffd84d;
    color: #17212d;
  }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    background: rgba(0,0,0,0.08);
    padding: 8px;
    border-radius: 10px;
    margin-top: 8px;
    white-space: pre-wrap;
  }
  @media (min-width: 720px) {
    .panel { left: 16px; right: auto; width: 560px; }
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <div class="title">Raket + vuur test</div>
  <div class="grid">
    <label>Vuurhoek <input id="flameAngle" type="range" min="-180" max="180" step="1" value="90"><span id="flameAngleValue"></span></label>
    <label>Vuur X <input id="flameX" type="range" min="-120" max="120" step="1" value="0"><span id="flameXValue"></span></label>
    <label>Vuur Y <input id="flameY" type="range" min="-120" max="120" step="1" value="44"><span id="flameYValue"></span></label>
    <label>Lengte <input id="flameLength" type="range" min="20" max="180" step="1" value="78"><span id="flameLengthValue"></span></label>
    <label>Breedte <input id="flameWidth" type="range" min="8" max="80" step="1" value="34"><span id="flameWidthValue"></span></label>
    <label>Raketgrootte <input id="rocketSize" type="range" min="110" max="320" step="1" value="215"><span id="rocketSizeValue"></span></label>
  </div>
  <div class="buttons">
    <button id="presetRight">Preset: vliegt naar rechts</button>
    <button id="presetLeft">Preset: vliegt naar links</button>
  </div>
  <div id="snippet" class="code"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const controls = {
  flameAngle: document.getElementById("flameAngle"),
  flameX: document.getElementById("flameX"),
  flameY: document.getElementById("flameY"),
  flameLength: document.getElementById("flameLength"),
  flameWidth: document.getElementById("flameWidth"),
  rocketSize: document.getElementById("rocketSize")
};

const values = Object.fromEntries(
  Object.keys(controls).map((key) => [key, document.getElementById(`${key}Value`)])
);
const snippet = document.getElementById("snippet");

const rocket = new Image();
rocket.src = "assets/raket.png";

let w = 0;
let h = 0;
let dpr = 1;
let t0 = performance.now();
let direction = 1;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
}
window.addEventListener("resize", resize);
resize();

function num(key) {
  return Number(controls[key].value);
}

function updateLabels() {
  values.flameAngle.textContent = `${num("flameAngle")}°`;
  values.flameX.textContent = `${num("flameX")}%`;
  values.flameY.textContent = `${num("flameY")}%`;
  values.flameLength.textContent = `${num("flameLength")}%`;
  values.flameWidth.textContent = `${num("flameWidth")}%`;
  values.rocketSize.textContent = `${num("rocketSize")}px`;

  snippet.textContent = `Gebruik in het spel:\nflameAngle: ${num("flameAngle")}°\nflameOriginX: ${num("flameX")}% van raketbreedte\nflameOriginY: ${num("flameY")}% van rakethoogte\nflameLength: ${num("flameLength")}% van raketbreedte\nflameWidth: ${num("flameWidth")}% van rakethoogte`;
}
Object.values(controls).forEach((el) => el.addEventListener("input", updateLabels));
updateLabels();

document.getElementById("presetRight").addEventListener("click", () => {
  direction = 1;
  controls.flameAngle.value = 90;
  controls.flameX.value = 0;
  controls.flameY.value = 44;
  controls.flameLength.value = 78;
  controls.flameWidth.value = 34;
  updateLabels();
});

document.getElementById("presetLeft").addEventListener("click", () => {
  direction = -1;
  controls.flameAngle.value = 90;
  controls.flameX.value = 0;
  controls.flameY.value = 44;
  controls.flameLength.value = 78;
  controls.flameWidth.value = 34;
  updateLabels();
});

function drawSky(now) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, "#071222");
  g.addColorStop(1, "#153552");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.75)";
  for (let i = 0; i < 42; i++) {
    const x = ((i * 131.7) % w);
    const y = ((i * 73.9) % Math.max(1, h - 180));
    const pulse = 0.55 + Math.sin(now * 0.002 + i) * 0.35;
    ctx.globalAlpha = 0.24 + pulse * 0.35;
    ctx.beginPath();
    ctx.arc(x, y, 1.1 + (i % 3) * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawFlame(drawW, drawH, now) {
  const angle = num("flameAngle") * Math.PI / 180;
  const originX = drawW * (num("flameX") / 100);
  const originY = drawH * (num("flameY") / 100);
  const length = drawW * (num("flameLength") / 100);
  const width = drawH * (num("flameWidth") / 100);
  const flicker = 0.88 + Math.sin(now * 0.021) * 0.08 + Math.sin(now * 0.047 + 1.2) * 0.06;

  const dirX = Math.cos(angle);
  const dirY = Math.sin(angle);
  const normalX = -dirY;
  const normalY = dirX;

  const tipX = originX + dirX * length * flicker;
  const tipY = originY + dirY * length * flicker;

  ctx.save();

  // Rook achter de vlam.
  for (let i = 0; i < 5; i++) {
    const p = ((now * 0.0014) + i / 5) % 1;
    const px = originX + dirX * length * (0.55 + p * 1.05);
    const py = originY + dirY * length * (0.55 + p * 1.05);
    const wobble = Math.sin(now * 0.004 + i * 1.7) * width * 0.18;
    ctx.globalAlpha = 0.18 * (1 - p);
    ctx.fillStyle = "#d8e0e8";
    ctx.beginPath();
    ctx.ellipse(
      px + normalX * wobble,
      py + normalY * wobble,
      width * (0.18 + p * 0.20),
      width * (0.12 + p * 0.18),
      angle,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }

  ctx.globalAlpha = 1;

  // Buitenste vuur.
  const outer = ctx.createLinearGradient(originX, originY, tipX, tipY);
  outer.addColorStop(0, "rgba(255,255,210,0.95)");
  outer.addColorStop(0.35, "rgba(255,185,35,0.88)");
  outer.addColorStop(0.7, "rgba(255,70,0,0.58)");
  outer.addColorStop(1, "rgba(255,40,0,0)");
  ctx.fillStyle = outer;
  ctx.beginPath();
  ctx.moveTo(originX + normalX * width * 0.38, originY + normalY * width * 0.38);
  ctx.quadraticCurveTo(originX + dirX * length * 0.38 + normalX * width * 0.72, originY + dirY * length * 0.38 + normalY * width * 0.72, tipX, tipY);
  ctx.quadraticCurveTo(originX + dirX * length * 0.38 - normalX * width * 0.72, originY + dirY * length * 0.38 - normalY * width * 0.72, originX - normalX * width * 0.38, originY - normalY * width * 0.38);
  ctx.closePath();
  ctx.fill();

  // Binnenste vuur.
  const innerTipX = originX + dirX * length * 0.68 * flicker;
  const innerTipY = originY + dirY * length * 0.68 * flicker;
  const inner = ctx.createLinearGradient(originX, originY, innerTipX, innerTipY);
  inner.addColorStop(0, "rgba(255,255,245,1)");
  inner.addColorStop(0.45, "rgba(255,232,130,0.95)");
  inner.addColorStop(1, "rgba(255,120,0,0)");
  ctx.fillStyle = inner;
  ctx.beginPath();
  ctx.moveTo(originX + normalX * width * 0.18, originY + normalY * width * 0.18);
  ctx.quadraticCurveTo(originX + dirX * length * 0.26 + normalX * width * 0.34, originY + dirY * length * 0.26 + normalY * width * 0.34, innerTipX, innerTipY);
  ctx.quadraticCurveTo(originX + dirX * length * 0.26 - normalX * width * 0.34, originY + dirY * length * 0.26 - normalY * width * 0.34, originX - normalX * width * 0.18, originY - normalY * width * 0.18);
  ctx.closePath();
  ctx.fill();

  // Motor-gloed, handig om te zien waar het vuur begint.
  ctx.fillStyle = "rgba(255,245,180,0.92)";
  ctx.beginPath();
  ctx.ellipse(originX, originY, width * 0.14, width * 0.09, angle, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawRocket(now) {
  if (!rocket.complete || !rocket.naturalWidth) return;

  const size = num("rocketSize");
  const scale = size / Math.max(rocket.width, rocket.height);
  const drawW = rocket.width * scale;
  const drawH = rocket.height * scale;

  const loopSeconds = 5.2;
  const p = ((now - t0) / 1000 / loopSeconds) % 1;
  const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;

  const margin = size * 0.9;
  const left = -margin;
  const right = w + margin;
  const x = direction === 1 ? left + (right - left) * eased : right - (right - left) * eased;
  const y = h * 0.37 + Math.sin(now * 0.0018) * h * 0.09;
  const routeRotation = direction === 1 ? Math.PI / 2 : -Math.PI / 2;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(routeRotation);

  // Het vuur wordt vóór de raket getekend, zodat het onder de raket valt.
  drawFlame(drawW, drawH, now);

  ctx.drawImage(rocket, -drawW / 2, -drawH / 2, drawW, drawH);
  ctx.restore();
}

function frame(now) {
  drawSky(now);
  drawRocket(now);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
